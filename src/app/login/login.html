<div class="login-container">

  <mat-card class="login-card">

    <mat-card-header>
      <mat-card-title>🔐 Iniciar Sesión</mat-card-title>
      <mat-card-subtitle>Accede a tu cuenta</mat-card-subtitle>
    </mat-card-header>

    <form #f="ngForm" (ngSubmit)="login()">

      <mat-card-content>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario o Email</mat-label>
          <input matInput [(ngModel)]="userOrEmail" name="userOrEmail" required>
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" required>
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions style="display: flex; flex-direction: column; gap: 12px; padding: 0 16px 16px 16px;">
        
        <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="!f.valid">
          Ingresar
        </button>
        
        <!-- 🛠️ CAMBIO DEFINITIVO: Botón plano con evento click manual -->
        <button mat-button type="button" (click)="irAlRegistro()" style="color: #3f51b5; margin-top: 4px; width: 100%;">
          ¿No tienes una cuenta? Regístrate aquí
        </button>

      </mat-card-actions>
      
    </form>

  </mat-card>

</div>
