<mat-sidenav-container class="container">

  <!-- SIDEBAR -->
  <mat-sidenav mode="side" [(opened)]="opened" class="sidenav">

    <div class="logo">
      🚀 Sistema
    </div>

    <mat-nav-list>

      <a mat-list-item routerLink="/dashboard">
        <mat-icon>dashboard</mat-icon>
        <span *ngIf="opened">Dashboard</span>
      </a>

      <a mat-list-item routerLink="/dashboard/empleados">
        <mat-icon>people</mat-icon>
        <span *ngIf="opened">Empleados</span>
      </a>

      <a mat-list-item routerLink="/dashboard/estatus">
        <mat-icon>assignment</mat-icon>
        <span *ngIf="opened">Estatus</span>
      </a>

 <a mat-list-item routerLink="/dashboard/unidades">
        <mat-icon>domain</mat-icon>
        <span *ngIf="opened">Unidades</span>
      </a>
      <a mat-list-item routerLink="/dashboard/madre">
        <mat-icon>female</mat-icon>
        <span *ngIf="opened">AgregarMadre</span>
      </a>

      <a mat-list-item routerLink="/dashboard/profile">
        <mat-icon>person</mat-icon>
        <span *ngIf="opened">Perfil</span>
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <!-- CONTENIDO -->
  <mat-sidenav-content>

    <!-- NAVBAR -->
    <mat-toolbar color="primary">

      <button mat-icon-button (click)="toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span>Dashboard</span>

      <span class="spacer"></span>

      <mat-icon>account_circle</mat-icon>
      <span>{{ usuario }}</span>

      <button mat-icon-button (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>

    </mat-toolbar>

    <!-- 🔥 AQUÍ SE CARGA TODO -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
